<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0E1A1A" />
  <title>SPL — ShuttlePlay</title>

  <link rel="manifest" href="./manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./css/tokens.css" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/forms.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="brand">
        <span class="shuttle-dot"></span>
        SPL
      </div>
      <div class="header-actions">
        <div class="sync-indicator" title="Confirms the app is talking to the live backend right now, not a cached copy">
          <span class="sync-dot" id="sync-dot" data-state="pending"></span>
          <span id="sync-text">Connecting…</span>
        </div>
        <button id="theme-toggle" class="btn btn-secondary" style="min-height:36px; padding: 6px 16px; font-size: var(--text-xs);">
          Toggle theme
        </button>
      </div>
    </header>

    <main class="app-main">
      <div id="view"><!-- router.js renders login/register/pending/home/admin/etc here --></div>
    </main>

    <nav class="bottom-nav" id="bottom-nav" hidden>
      <a href="#/" class="nav-item" data-route="/">
        <span>Home</span>
      </a>
      <a href="#/availability" class="nav-item" data-route="/availability">
        <span>Availability</span>
      </a>
      <a href="#/court" class="nav-item" data-route="/court">
        <span>Court</span>
      </a>
      <a href="#/announcements" class="nav-item" data-route="/announcements">
        <span>News</span>
      </a>
      <a href="#/profile" class="nav-item" data-route="/profile">
        <span>Profile</span>
      </a>
    </nav>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
